<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人主页</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #1a1a1a;
      background: #fff;
    }

    .card {
      text-align: center;
      padding: 48px 32px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #e5e5e5;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: #999;
    }

    .name {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .title {
      font-size: 15px;
      color: #666;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .links a {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 15px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 2px;
      transition: border-color 0.2s, color 0.2s;
    }

    .links a:hover {
      border-color: #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">&#x1f464;</div>
    <div class="name">你的名字</div>
    <p class="title">开发者</p>
    <div class="links">
      <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
      <a href="mailto:you@example.com">Email</a>
    </div>
  </div>
</body>
</html>
